title: '§0§l公共傳送點&f » §x§1§c§1§c§1§c§l編輯 %warp%'
# a gui can have 1-6 rows
rows: 5
# how many items should be shown on a single page?
page-size: 21
# should the gui auto update?
# in ticks, 20 ticks = 1 second
# set to -1 to disable auto updater
auto-update-ticks: -1

