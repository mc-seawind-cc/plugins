commands:
  main:
    description: Opens the listing browser
    aliases:
    - auctionhouse
    - ah
    - auctions
    - auction
  sell:
    description: 在商城上架一個新商品
    aliases:
    - new-listing
    - create-listing
    must-hold-item: '&7[&#FF3300❌&7] 必須手持商品才可上價。'
    must-be-number: '&7[&#FF3300❌&7] 價格必須是一個數字。'
    max-listings: '&7[&#FF3300❌&7] 貨價已滿。&8(&7%current%&8/&7%max%&8)'
    listing-price:
      max: '&7售價必須低於 &f%price%&7。'
      min: '&7售價必須高於 &f%price%&7。'
  view:
    description: 查看其他玩家的活躍上架商品
    aliases:
    - visit
  watch:
    description: 關注上架商品，當有符合條件的商品上架時收到通知
    aliases:
    - listen
  profile:
    description: 查看您的拍賣個人資料
    aliases: []
