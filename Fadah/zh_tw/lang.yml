    highlight-color: '#9be0af'
    alternative-highlight-color: '#bba4e0'
    text-color: '#7c7a80'
    accent-color: '#525254'
  reload:
    description: 重新加載線上商城
    aliases:
    - rl
    success: '&a所有配置文件已成功重新加載！'
    fail: '&c某些配置文件加載失敗！ &7(查看控制台)'
    remote: '&a已收到全局配置重新加載！'
