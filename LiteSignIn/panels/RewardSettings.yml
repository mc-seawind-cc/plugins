      # 在特定時間段簽到時觸發。
      Special-Time-periods:
        # 格式：時:分:秒
        # 最小值：00:00:00，最大值：23:59:59
        # 沒有分鐘或秒鐘意味着分鐘或秒鐘可以是任何時間段。
        # 例如：'12:00' 是 '12:00:00-12:00:59' 時段。
        #      '12' 是 '12:00:00-12:59:59' 時段。
        # 晚上十一點半
        '23:00:00':
          # 選項類型：On_Time, After_This_Time, Before_This_Time
          # 對應：準時簽到，該時間後簽到，該時間前簽到。
          Option: After_This_Time # 22:30:00後簽到
          # 時間限制。如果類型不是On_Time，您可以設置閾值。
          # "23:59:59" 將每天22:30:00到23:59:59觸發。
          Time-Limit: '23:59:59'
