Reward-Settings:
  # Groups 優先級，從上到下。
  Groups-Priority:
  - 低階會員
  - Discord加成
  - 兒少代表
  - Default
  Permission-Groups:
    # 這是預設群組，不能刪除！
    Default:
      # 正常登入時觸發
      Normal-Time:
        # 簽名時發送訊息。
        # 支援佔位符API
        Messages:
        - '#CBE0FD系統 &8| &7[#00FB9A✔&7] 已發送平日簽到獎勵 : &f風汐碎片×2及風幣×180 &7。'
        # 簽到時的獎勵物品
        # 在此選項中，您可以直接填寫原始物品的名稱，
        # 或RewardSettings.yml中的物品（包括手動設置、通過指令添加）。
        # 格式：[物品名稱|集合名稱]:[數量]
        # 例如："diamond:5" 獎勵5顆鑽石。
        # 您可以使用佔位符 "[最小值]_[最大值]" 隨機獎勵數量的物品。
        # 例如："diamond:1-3" 隨機獎勵1-3顆鑽石。
        Reward-Items:
        - 風汐碎片:2
        # 簽到時發送廣播訊息。
        # 此選項中的信息將被所有人看到。
        Broadcast-Messages: []
        # 簽到時播放聲音。
        # 格式：[聲音]-[音量]-[音調]-[所有人都能聽到？]
        Play-Sounds:
        - ENTITY_EXPERIENCE_ORB_PICKUP-1-1-FALSE
        # 簽到時執行指令。
        # 格式：[指令類型]:[指令]
        # 指令類型 可以是 "op" 、 "server"、 None
        # 對應 "玩家以OP權限執行指令"、 "執行控制台指令"、 "玩家正常執行指令"。
        # 例如：
        # "server:say hello" - 執行控制台指令: "say hello"
        # "op:gamemode creative" - 玩家以OP權限執行指令: "gamemode creative"
        # "spawn" - 玩家正常執行 "spawn" 指令。
        # 支持PlaceholderAPI
        Commands:
        - server:eco give {player} 180
      # 補簽時觸發。
      Retroactive-Time:
        # 用於禁止玩家通過補簽獲得以下模塊的獎勵。
        Disabled-Modules:
          # 建議啟用，以防止玩家在某些特殊日期直接獲取特殊獎勵。
          Special-Dates: true
          Special-Weeks: true
          Statistics-Times: false
          Statistics-Times-Of-Month: false
          Statistics-Times-Of-Cycle: 'null'
        Messages:
        - '{prefix} &7[#00FB9A✔&7] 已發送補簽獎勵 : &f風汐碎片×1及風幣×150 &7。'
        Play-Sounds:
        - ENTITY_EXPERIENCE_ORB_PICKUP-1-1-FALSE
        Reward-Items:
        - 風汐碎片:1
        Commands:
        - server:eco give {player} 150
