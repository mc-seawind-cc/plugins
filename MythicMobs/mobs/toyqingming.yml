PaperHorseSpirit:
  Type: SKELETON_HORSE
  Display: '&f紙馬靈'
  Health: 50
  Damage: 8
  Armor: 6
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  - 2 player
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  Skills:
    - effect{type=PARTICLE;particle=ASH;amount=15;speed=0.2} @Self ~onSpawn
    - effect{type=SOUND;sound=ENTITY_HORSE_AMBIENT;volume=1;pitch=0.7} @Self ~onTimer:60
    - damage{a=8} @PlayersInRadius{r=3} ~onHit
  Drops:
  - cmd{c="mi give MATERIAL ASHEN_PAPER <trigger.name> 1"} 1 0.8
  Options:
    PreventOtherDrops: true
    PreventRandomEquipment: true
    Despawn: false
    Glowing: true

