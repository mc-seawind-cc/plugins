ChildSpirit:
  Type: BABY_ZOMBIE
  Display: '&7童心幽魂'
  Health: 100
  Damage: 15
  Armor: 8
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  - 2 player
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
