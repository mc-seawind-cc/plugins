KingNianBeast:
  Type: ZOMBIE
  Display: '&4年獸王'
  Health: 2000
  Damage: 40
  Armor: 30
  AIGoalSelectors:
    - 0 clear
    - 1 meleeattack
  AITargetSelectors:
    - 0 clear
    - 1 player
  Skills:
    - potion{p=STRENGTH;duration=200;level=2} @Self ~onSpawn
    - effect{type=PARTICLE;particle=SMOKE_LARGE;amount=50;speed=0.2} @Self ~onHit
    - damage{a=15} @PlayersInRadius{r=5} ~onTimer:40
    - ignite{ticks=100} @PlayersInRadius{r=3} ~onHit
    - summon{type=WOLF;amount=2;radius=5;level=3} @Self ~onHealthBelow{h=1000}
    - message{m="&c年獸王震怒，召喚部下助戰！"} @PlayersInRadius{r=15} ~onHealthBelow{h=1000}
  Drops:

  Options:
    PreventOtherDrops: true
    PreventRandomEquipment: true
    Glowing: true
    NoAI: false
    NoKnockback: false
