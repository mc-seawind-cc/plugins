Bonguk_bloom_D:
  Skills:
    - skill{s=Bonguk_bloom_skill} @EntitiesNearOrigin{r=4}


Bonguk_bloom_skill:
  TargetConditions:
    - entitytype{t=ARMOR_STAND} false
    - hasaura{n=Bonguk_bloom_skill_hit} false
  Skills:
    - Aura{auraName=Bonguk_bloom_skill_hit;duration=20} @Target
    - damage{a=5;pkb=true;hnp=true;hp=true;delay=1}
    - delay 10
    - damage{a=5;pkb=true;hnp=true;hp=true;delay=1}
    - delay 10
    - damage{a=5;pkb=true;hnp=true;hp=true;delay=1}
    - delay 10
    - damage{a=5;pkb=true;hnp=true;hp=true;delay=1}


Bonguk_charm:
  Conditions:
    - hasaurastacks{auraName=Glacier_Smash_aura} castinstead Bonguk_charm_SKILL
  Skills:
    - Aura{auraName=Glacier_Smash_aura;interval=1;duration=5} @self

Bonguk_charm_SKILL:
  Cooldown: 4
  Conditions:
    - crouching false
  Skills:
    - effect:sound{s=block.amethyst_block.chime;volume=1.25} @self
    - effect:sound{s=entity.allay.hurt} @self
    - effect:sound{s=entity.illusioner.cast_spell} @self
    - effect:sound{s=block.respawn_anchor.deplete;volume=0.5;pitch=1.5} @self

    - orbital{bulletType=MOB;mob=bonguk_charm;hr=1;vr=1;hp=false;hnp=false;r=0;points=1;i=1;duration=100;oy=2;rx=0;ry=0;rz=0;avx=0;avy=0;avz=0} @self
    - delay 8
    - skill{s=Bonguk_charm_shoot} @self

Bonguk_charm_unload:
  Skills:
    - state{s=skill} @self
    - delay 10
    - remove @self

Bonguk_charm_shoot:
  Skills:
    - skill{s=Bonguk_charm_shoot_projectile} @self
    - delay 4
    - skill{s=Bonguk_charm_shoot_projectile} @self
    - delay 4
    - skill{s=Bonguk_charm_shoot_projectile} @self
    - delay 4
    - skill{s=Bonguk_charm_shoot_projectile} @self

