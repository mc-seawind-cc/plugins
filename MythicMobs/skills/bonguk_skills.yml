    - effect:sound{s=entity.witch.throw} @self
    - effect:sound{s=block.respawn_anchor.set_spawn;volume=0.25} @self
    - effect:sound{s=entity.allay.item_thrown;volume=1} @self
    - effect:sound{s=entity.allay.item_taken;volume=1.25;pitch=1.3} @self
    - effect:sound{s=entity.drowned.shoot;volume=0.75} @self
    - delay 5
    - effect:sound{s=entity.drowned.shoot;volume=0.75} @self
    - effect:sound{s=entity.witch.throw} @self
    - effect:sound{s=entity.allay.item_thrown;volume=1} @self
    - effect:sound{s=entity.allay.item_taken;volume=1.25;pitch=1.3} @self
    - delay 5
    - effect:sound{s=entity.drowned.shoot;volume=0.75} @self
