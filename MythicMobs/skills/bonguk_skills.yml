  Skills:
    - effect:sound{s=entity.allay.item_thrown;volume=1} @self
    - effect:sound{s=block.amethyst_block.chime;volume=1.25} @self
    - effect:sound{s=entity.illusioner.cast_spell} @self
    - projectile{bulletType=MOB;mob=bonguk_charm_projectile;onHit=Bonguk_charm_hit_D;v=18;i=1;hR=1;vR=1;mr=30;hnp=true;hO=0.3;sE=false;sB=true;hs=false;hfs=0;sfo=0;syo=2.5;tyo=2;sso=0;} @Forward{f=30;y=1.5}

