# gui标题
title: "§0§l稱號系統&f » §x§1§c§1§c§1§c§l稱號列表"
viewTitle: "§0§l稱號系統&f » §x§1§c§1§c§1§c§l管理&f » §x§1§c§1§c§1§c§l稱號列表"
size: 54
sound: ""

# 默认称号的样式
open:
  # 称号默认显示名称
  name : "§7# §f${titleName}"
  # 称号所显示的位置
  index: 12,13,14,15,16,21,22,23,24,25,30,31,32,33,34,39,40,41,42,43
  # 称号未使用的默认材质
  material: NAME_TAG
  # 称号使用中的默认材质
  useMaterial: BRUSH
  # 称号默认自定义材质
  custom-model-data: 0
  sound: ""
  # 称号lore-多层级，某部分有会显示，没有不会显示出来，留空表示不显示这个层级
  lore:
    info:
      - '&8&m                                               &r'
      - '&7　狀態 : &r${useStatus}'
      - '&7　期限 : &#D5F1FD${expirationTime}'
    description:
      - '&7 '
      - '&7　描述 &7: '
      - '&7> &f${description}'
    buff: 
      - '&7 '
      - '&7　增益 &7: '
      - '&7> &f${buff}'
    particle:
      - '&7 '
      - '&7　粒子 &7: '
      - '&7> &f${particle}'
    status:
    button:
      - '&8&m                                               &r'
      - '&7*${useButton}'
  viewLore:
    - '&8&m                                               &r'
    - '&7　編號 : &7${id}'
    - '&7　顯示 : &#D5F1FD${titleName}'
    - '&7　期限 : &#D5F1FD${expirationTime}'
    - '&7　描述 &7: '
    - '&7> &f${description}'
    - '&7　增益 &7: '
    - '&7> &f${buff}'
    - '&7　粒子 &7: '
    - '&7> &f${particle}'
    - '&8&m                                               &r'
    - '&7*點擊 刪除此稱號'

inUse: "&#00FB9A已使用"
notUse: "&#FF3300未使用"
useButton: "&7點擊 使用稱號"
