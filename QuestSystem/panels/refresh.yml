# gui标题
title: "&0刷新任务"
size: 27
sound: ""

# 点券
point:
  # 是否使用
  enable: true
  # 在gui中的坐标
  index: 11
  # 在gui中的材质名称
  material: DIAMOND
  # 是否附魔效果
  isEnchant: true
  # 在gui中的名称
  name: "   &8[&5ℑ&8] ▪ &8[&d点券刷新&8]"
  # 自定义模型材质 1.14+生效 0为不生效
  custom-model-data: 0
  # 在gui中的lore ${guild_name}
  lore:
    - ''
    - '&8▪ &7点券刷新任务'
    - '&8▪ &7可刷新 &a${number} &7次'
    - ''
    - '&8▪ &7需支付 &a${price} &7点券'
    - '&8▪ &7你拥有 &a${money} &7点券'
    - ''
    - '${button}'
  # 价格
  price: 150

# 金币
vault:
  enable: true
  index: 15
  material: GOLD_INGOT
  isEnchant: false
  name: "   &8[&6ℑ&8] ▪ &8[&e金币刷新&8]"
  custom-model-data: 0
  lore:
    - ''
    - '&8▪ &7金币刷新任务'
    - '&8▪ &7可刷新 &a${number} &7次'
    - ''
    - '&8▪ &7需支付 &a${price} &7金币'
    - '&8▪ &7你拥有 &a${money} &7金币'
    - ''
    - '${button}'
  price: 10000

# 返回按钮
back:
  enable: true
  index: 22
  name: "   &8[&a返回&8]"
  material: BARRIER
  isEnchant: false
  lore:
    - '&f- &7点击返回'
  custom-model-data: 0

# 一个玩家可以刷新的次数(可无限扩展和修改子节点，权限格式: playerTask.refreshNumber.权限类型)
refreshNumber:
  # 默认玩家的上限
  default: 3
  # vip1的上限 需要权限 playerTask.refreshNumber.vip1
  vip1: 5
  # vip2的上限 需要权限 playerTask.refreshNumber.vip2
  vip2: 8
  # vip3的上限 需要权限 playerTask.refreshNumber.vip3
  vip3: 10

# 是否开启完成过任务禁止刷新 true 开启 false 关闭
doneRefresh: true