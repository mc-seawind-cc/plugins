# 任务记分板是否开启
enable: true

# 任务记分板配置
key: "task"

# 存在任务进度显示的优先级
existPriority: 30

# 不存在任务进度显示的优先级
notExistPriority: -1

# 任务记分板显示内容
# 可用变量 任务稀有度 ${rarity} 任务描述 ${description} 任务目标 ${taskSchedule} 任务奖励 ${taskReward}
lines:
  - '${taskName}'
  - ''
  - '&f[ &c任务目标 &f]'
  - '&c>> &a${taskSchedule}'
  - '&f[ &c任务奖励 &f]'
  - '&c>> &a${taskReward}'
  - ''
  - '&8[&a!&8] &a/sd&7切换显示'

# 无任务时记分板显示内容
noTaskLines:
  - ''
  - '&a✔ 已完成所有任务'
  - ''
  - '&7当前没有进行中的任务'
  - ''