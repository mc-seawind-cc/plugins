# gui标题
title: "§0§l任務系統&f » §x§1§c§1§c§1§c§l重新整理任務"
size: 27
sound: ""

# 點券
point:
  # 是否使用
  enable: true
  # 在gui中的坐标
  index: 11
  # 在gui中的材质名称
  material: DIAMOND
  # 是否附魔效果
  isEnchant: true
  # 在gui中的名称
  name: "&#9dafff> &f點券重新整理"
  # 自定义模型材质 1.14+生效 0为不生效
  custom-model-data: 0
  # 在gui中的lore ${guild_name}
  lore:
    - '&8&m                                               &r'
    - '&7　可重新整理 &a${number} &7次'
    - '&7　需支付 &a${price} &7點券'
    - '&7　你擁有 &a${money} &7點券'
    - '&8&m                                               &r'
    - '${button}'
  # 价格
  price: 150

# 金幣
vault:
  enable: true
  index: 15
  material: GOLD_INGOT
  isEnchant: false
  name: "&#9dafff> &f金幣重新整理"
  custom-model-data: 0
  lore:
    - '&8&m                                               &r'
    - '&7　可重新整理 &a${number} &7次'
    - '&7　需支付 &a${price} &7金幣'
    - '&7　你擁有 &a${money} &7金幣'
    - '&8&m                                               &r'
    - '${button}'
  price: 10000

# 返回按钮
back:
  enable: true
  index: 22
  name: '&#9dafff> &f返回'
  material: BARRIER
  isEnchant: false
  lore:
    - '&f- &7點擊返回'
  custom-model-data: 0

# 一个玩家可以重新整理的次数(可无限扩展和修改子节点，权限格式: playerTask.refreshNumber.权限类型)
refreshNumber:
  # 默认玩家的上限
  default: 3
  # vip1的上限 需要权限 playerTask.refreshNumber.vip1
  vip1: 5
  # vip2的上限 需要权限 playerTask.refreshNumber.vip2
  vip2: 8
  # vip3的上限 需要权限 playerTask.refreshNumber.vip3
  vip3: 10

# 是否开启完成过任务禁止重新整理 true 开启 false 關閉
doneRefresh: true