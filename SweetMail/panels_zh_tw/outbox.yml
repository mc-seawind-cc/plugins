# 界面標題，支持 PAPI
title: '§0§l蜂聊郵政&f » §x§1§c§1§c§1§c§l已寄郵件 §x§1§c§1§c§1§c%page%§f/§x§1§c§1§c§1§c%max_page%'
title-other: '§0§l蜂聊郵政&f » %target%已寄郵件 §x§1§c§1§c§1§c%page%§f/§x§1§c§1§c§1§c%max_page%'
# 界面佈局，每行9個圖示，不能超過6行
inventory:
  - '黑黑黑黑黑黑黑黑黑'
  - '黑草黑格格格格格黑'
  - '黑全黑格格格格格黑'
  - '黑读黑格格格格格黑'
  - '黑发黑格格格格格黑'
  - '黑黑黑黑黑上黑下選'
# 重載時不在後台警告缺失的必選物品名
ignored: []
# 必選物品
items:
  全:
    material: ITEM_FRAME
    display: '§x§9§d§a§f§f§f> §f收件匣'
    lore:
      - '§7*點擊 查看收件匣'
  读:
    material: PAINTING
    display: '§x§9§d§a§f§f§f> §f未讀郵件'
    lore:
      - '&8&m                                               &r'
      - '§7　未領取附件依舊視為未讀'
      - '§7　'
      - '§7　'
      - '&8&m                                               &r'
      - '§7*左鍵 查看未讀郵件'
      - '§7*右鍵 全部設為已讀'
  发:
    material: CHEST
    display: '§x§9§d§a§f§f§f> §f已寄郵件'
    lore:
      - '§7*點擊 查看已寄郵件'
  上:
    material: arrow
    display: '§x§9§d§a§f§f§f> §f上一頁'
  下:
    material: arrow
    display: '§x§9§d§a§f§f§f> §f下一頁'
  格:
    redirect: 无
    display: '&7# &f%title%'
    lore-parts:
      part1:
      - '&8&m                                               &r'
      - '§7　寄件者 : &f%sender%'
      - '§7　收件者 : &f%receiver%'
      - '§7　時　間 : §x§D§5§F§1§F§D%time%'
      - '§7　文　本 : §x§D§5§F§1§F§D%count% 字&7(共 %pages% 頁)'
      - '&7'
      - '§7　附件預覽 : '
      part2:
      - '&8&m                                               &r'
      - '§7*點擊 §x§F§D§F§D§9§6左　鍵 &7查看郵件內容'
      - '§7*點擊 §x§F§D§F§D§9§6右　鍵 &7查看郵件附件'
      - '§7*點擊 §x§F§D§F§D§9§6丟棄鍵 &7刪除郵件(不可復原)'
    lore-content:
      - part1
      - attachments
      - part2
    lore-format:
      and-so-on: '%player% &7等 %count% 名玩家'
      attachment-item:
        - '&7> &f%attachment%'
      attachment-and-so-on:
        max-count: 3
        lore:
          - '&7> ...合計 %count% 個附件'
# 非必選物品
other-items:
  黑:
    material: BLACK_STAINED_GLASS_PANE
    custom-model: 10000
    display: '&0'
  无:
    material: AIR
  草:
    material: paper
    display: '§x§9§d§a§f§f§f> §f草稿'
    lore:
      - '§7*點擊 開啟草稿頁面'
    left-click-commands:
      - '[close]'
      - '[player]sm draft'
    right-click-commands:
      - '[close]'
      - '[player]sm draft'
  選:
    material: barrier
    display: '§x§9§d§a§f§f§f> §f選單'
    lore:
      - '§7*點擊 開啟選單'
    left-click-commands:
      - '[player]commandpanel 首頁1'
    right-click-commands:
      - '[player]commandpanel 首頁1'
