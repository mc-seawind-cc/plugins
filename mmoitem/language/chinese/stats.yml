# Abilities (changed in MI 6.9.5)
ability:
  general-format: '&7{trigger}&8 ⏵ &7&l{ability}' #"&8| &7{trigger} &8|&e|&8| &7&l{ability}"
  modifier-if-any: "\n" # Appended to general-format if the skill has at least one modifier
  modifier-foreach: '&8|  &7{modifier}&7 : &f{value}' #"&7{modifier}&8: &f{value}"
  modifier-splitter: " &8&l|&7 "
  modifiers-per-line: 3
  ability-splitter:
    enabled: true
    format: 'test'

