# Abilities (changed in MI 6.9.5)
ability:
  general-format: '&7　*{trigger} &7觸發 §x§5§e§5§4§8§e{ability}' #"&8| &7{trigger} &8|&e|&8| &7&l{ability}"
  modifier-if-any: "\n" # Appended to general-format if the skill has at least one modifier
  modifier-foreach: '&r&7　{modifier}&7 : &f{value}&r' #"&7{modifier}&8: &f{value}"
  modifier-splitter: "　"
  modifiers-per-line: 4
  ability-splitter:
    enabled: true
    format: '&8　'

